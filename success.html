<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent — Once Upon a Stage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #FAFAF7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 3rem;
    max-width: 500px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border-top: 3px solid #d4af37;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    color: #2a1a3e;
    margin-bottom: 0.5rem;
  }
  p {
    color: #5a4a6e;
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }
  a {
    display: inline-block;
    background: linear-gradient(135deg, #ffd700, #c8a415);
    color: #1a0a2e;
    font-weight: 700;
    padding: 0.8rem 2rem;
    border-radius: 50px;
    text-decoration: none;
    transition: transform 0.2s;
  }
  a:hover { transform: translateY(-2px); }
</style>
</head>
<body>
<div class="card">
  <h1>Message Sent!</h1>
  <p>Thanks for reaching out! We'll get back to you as soon as we can.</p>
  <a href="/">Back to Once Upon a Stage</a>
</div>
</body>
</html>
